<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --text2: #888; --text3: #555;
    --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12); --accent-text: #0a0a0a;
    --red: #ff4d4d; --red-dim: rgba(255,77,77,0.12);
    --safe-top: env(safe-area-inset-top, 44px); --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
  .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
  .screen.active { display: flex; }
  .header { padding: calc(var(--safe-top) + 12px) 20px 16px; background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .header .sub { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .body { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: calc(var(--safe-bottom) + 80px); }
  .bottom-nav { padding: 10px 20px calc(var(--safe-bottom) + 10px); background: var(--bg); border-top: 0.5px solid var(--border); flex-shrink: 0; }
  .btn-primary { display: block; width: 100%; padding: 14px; background: var(--accent); color: var(--accent-text); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-ghost { display: block; width: 100%; padding: 13px; background: none; color: var(--text2); border: 0.5px solid var(--border2); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; }
  .btn-sm { padding: 6px 12px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; }
  .btn-icon { width: 30px; height: 30px; background: var(--red-dim); border: none; border-radius: 8px; color: var(--red); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-back { background: none; border: none; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 0; }
  .btn-text-danger { background: none; border: none; color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; padding: 0; }
  .btn-accent-sm { padding: 6px 12px; background: var(--accent-dim); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--accent); cursor: pointer; }
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .card-dashed { background: transparent; border: 0.5px dashed var(--border2); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 600; color: var(--accent); letter-spacing: -1px; }
  input[type=text], input[type=number] { width: 100%; padding: 10px 12px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; -webkit-appearance: none; }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .ex-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .ex-note { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px; }
  .sets-label { display: grid; grid-template-columns: 36px minmax(0,1fr) minmax(0,1fr) 30px; gap: 6px; margin-bottom: 6px; }
  .sets-label span { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
  .set-row { display: grid; grid-template-columns: 36px minmax(0,1fr) minmax(0,1fr) 30px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .set-num { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; padding-top: 10px; }
  .unit-toggle { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .unit-opt { flex: 1; padding: 8px; border: none; background: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .unit-opt.active { background: var(--accent); color: var(--accent-text); }
  .day-card { display: flex; align-items: center; justify-content: space-between; }
  .day-name { font-size: 15px; font-weight: 600; }
  .day-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .day-tag { font-size: 11px; padding: 4px 10px; background: var(--accent-dim); color: var(--accent); border-radius: 20px; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .chevron { color: var(--text3); font-size: 18px; }
  .view-set-row { display: grid; grid-template-columns: 50px 1fr 1fr; font-size: 13px; padding: 6px 0; border-top: 0.5px solid var(--border); }
  .view-set-row .set-label { color: var(--text3); font-family: 'DM Mono', monospace; }
  .add-ex-row { display: flex; gap: 8px; }
  .add-ex-row input { flex: 1; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; line-height: 1.6; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .section-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 10px; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="header">
    <div class="header-row">
      <div><h1>Gym Tracker</h1><div class="sub">Women's Strength + Fat Loss</div></div>
      <button class="btn-accent-sm" onclick="showScreen('pick-day')">+ Start</button>
    </div>
  </div>
  <div class="body">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">This week</div><div class="stat-val" id="stat-week">0</div></div>
    </div>
    <div class="section-label">History</div>
    <div id="workout-list"></div>
  </div>
</div>

<div id="pick-day" class="screen">
  <div class="header">
    <div class="header-row">
      <button class="btn-back" onclick="showScreen('home')">← Back</button>
      <span style="font-size:15px;font-weight:600;">Your Program</span>
      <div style="width:50px;"></div>
    </div>
  </div>
  <div class="body">
    <div class="section-label">Choose a day to start</div>
    <div id="day-list"></div>
  </div>
</div>

<div id="log-workout" class="screen">
  <div class="header">
    <div class="header-row">
      <button class="btn-back" onclick="confirmDone()">← Done</button>
      <span style="font-size:15px;font-weight:600;" id="log-title">Workout</span>
      <div style="width:50px;"></div>
    </div>
  </div>
  <div class="body">
    <div class="unit-toggle">
      <button class="unit-opt active" id="unit-kg" onclick="setUnit('kg')">kg</button>
      <button class="unit-opt" id="unit-lb" onclick="setUnit('lb')">lb</button>
    </div>
    <div id="exercises-list"></div>
    <div class="card-dashed">
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">Add extra exercise</div>
      <div class="add-ex-row">
        <input type="text" id="ex-name" placeholder="Exercise name">
        <button class="btn-sm" onclick="addExercise()">Add</button>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="btn-primary" onclick="saveWorkout()">Save Workout</button>
  </div>
</div>

<div id="view-workout" class="screen">
  <div class="header">
    <div class="header-row">
      <button class="btn-back" onclick="showScreen('home')">← Back</button>
      <span style="font-size:15px;font-weight:600;" id="view-title"></span>
      <button class="btn-text-danger" onclick="deleteWorkout()">Delete</button>
    </div>
    <div class="sub" id="view-date" style="margin-top:8px;"></div>
  </div>
  <div class="body"><div id="view-content"></div></div>
</div>

<script>
const PROGRAM = [
  { day:"Monday", label:"Lower Body Strength", tag:"Glutes + Legs", exercises:[
    {name:"Leg Press",note:"4 × 6–8 reps",sets:4},
    {name:"Romanian Deadlift",note:"4 × 6 reps",sets:4},
    {name:"Bulgarian Split Squats",note:"3 × 8 each leg",sets:3},
    {name:"Hip Thrusts",note:"3 × 8–10 reps",sets:3},
    {name:"Hamstring Curls",note:"3 × 10 reps",sets:3},
    {name:"Plank",note:"3 × 45 sec",sets:3}]},
  { day:"Tuesday", label:"Upper Body Push", tag:"Chest + Shoulders", exercises:[
    {name:"Dumbbell Bench Press",note:"4 × 6 reps",sets:4},
    {name:"Seated DB Shoulder Press",note:"4 × 6–8 reps",sets:4},
    {name:"Incline Dumbbell Press",note:"3 × 8 reps",sets:3},
    {name:"Lateral Raises",note:"3 × 12 reps",sets:3},
    {name:"Tricep Pushdowns",note:"3 × 12 reps",sets:3},
    {name:"Cable Chest Fly",note:"2 × 12 reps",sets:2}]},
  { day:"Wednesday", label:"Pull Day + Short Run", tag:"Back + Biceps", exercises:[
    {name:"Trap Bar Deadlift",note:"4 × 5 reps",sets:4},
    {name:"Lat Pulldown",note:"4 × 8 reps",sets:4},
    {name:"Seated Cable Row",note:"3 × 8–10 reps",sets:3},
    {name:"Face Pulls",note:"3 × 12 reps",sets:3},
    {name:"Dumbbell Bicep Curls",note:"3 × 10 reps",sets:3},
    {name:"Rear Delt Fly",note:"2 × 12 reps",sets:2},
    {name:"Easy Run / Intervals",note:"20 min easy OR 5×1 min hard",sets:1}]},
  { day:"Thursday", label:"Lower Body + Conditioning", tag:"Legs + Cardio", exercises:[
    {name:"Goblet Squats",note:"3 × 10 reps",sets:3},
    {name:"Dumbbell RDL",note:"3 × 10 reps",sets:3},
    {name:"Walking Lunges",note:"3 × 10 each leg",sets:3},
    {name:"Cable Kickbacks",note:"3 × 12 reps",sets:3},
    {name:"Incline Treadmill / Rowing",note:"10 min finisher",sets:1}]},
  { day:"Friday", label:"Run Day", tag:"Cardio", exercises:[
    {name:"5km Steady Run",note:"Best fat loss option",sets:1},
    {name:"400m Intervals",note:"6 × 400m with walk recovery",sets:6}]}
];

let state={workouts:[],unit:'kg'};
let currentWorkout=null,currentExercises=[],viewingId=null;
try{const s=localStorage.getItem('gymTrackerIOS');if(s)state={...state,...JSON.parse(s)};}catch(e){}

function save(){try{localStorage.setItem('gymTrackerIOS',JSON.stringify(state));}catch(e){}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='home')renderHome();if(id==='pick-day')renderDayList();}
function setUnit(u){state.unit=u;document.getElementById('unit-kg').classList.toggle('active',u==='kg');document.getElementById('unit-lb').classList.toggle('active',u==='lb');save();renderExercises();}

function renderDayList(){
  document.getElementById('day-list').innerHTML=PROGRAM.map((d,i)=>`
    <div class="card" style="cursor:pointer;" onclick="startDay(${i})">
      <div class="day-card">
        <div><div class="day-name">${d.day} — ${d.label}</div><div class="day-sub">${d.exercises.length} exercises</div></div>
        <div style="display:flex;align-items:center;gap:10px;"><span class="day-tag">${d.tag}</span><span class="chevron">›</span></div>
      </div>
    </div>`).join('');
}

function startDay(idx){
  const d=PROGRAM[idx];
  const date=new Date().toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long'});
  currentWorkout={id:Date.now(),name:d.day+' — '+d.label,date,dayIdx:idx};
  currentExercises=d.exercises.map(ex=>({id:Math.random(),name:ex.name,note:ex.note,sets:Array.from({length:ex.sets},()=>({reps:'',weight:''}))}));
  document.getElementById('log-title').textContent=d.label;
  document.getElementById('unit-kg').classList.toggle('active',state.unit==='kg');
  document.getElementById('unit-lb').classList.toggle('active',state.unit==='lb');
  renderExercises();showScreen('log-workout');
}

function addExercise(){const n=document.getElementById('ex-name').value.trim();if(!n)return;currentExercises.push({id:Math.random(),name:n,note:'',sets:[{reps:'',weight:''}]});document.getElementById('ex-name').value='';renderExercises();}
function addSet(i){currentExercises[i].sets.push({reps:'',weight:''});renderExercises();}
function removeSet(i,j){if(currentExercises[i].sets.length>1){currentExercises[i].sets.splice(j,1);renderExercises();}}
function removeExercise(i){if(confirm('Remove '+currentExercises[i].name+'?')){currentExercises.splice(i,1);renderExercises();}}
function updateSet(i,j,f,v){currentExercises[i].sets[j][f]=v;}

function renderExercises(){
  const el=document.getElementById('exercises-list');
  if(!currentExercises.length){el.innerHTML='<div class="empty"><div class="empty-icon">💪</div>No exercises yet</div>';return;}
  el.innerHTML=currentExercises.map((ex,i)=>`
    <div class="card">
      <div class="ex-header">
        <div><div class="ex-name">${ex.name}</div>${ex.note?`<div class="ex-note">${ex.note}</div>`:''}</div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button class="btn-sm" onclick="addSet(${i})">+ Set</button>
          <button class="btn-icon" onclick="removeExercise(${i})">×</button>
        </div>
      </div>
      <div class="sets-label"><span></span><span>Reps</span><span>${state.unit}</span><span></span></div>
      ${ex.sets.map((s,j)=>`
        <div class="set-row">
          <div class="set-num">${j+1}</div>
          <input type="number" min="0" placeholder="—" value="${s.reps}" oninput="updateSet(${i},${j},'reps',this.value)">
          <input type="number" min="0" step="0.5" placeholder="—" value="${s.weight}" oninput="updateSet(${i},${j},'weight',this.value)">
          <button class="btn-icon" onclick="removeSet(${i},${j})" style="width:28px;height:28px;font-size:14px;">×</button>
        </div>`).join('')}
    </div>`).join('');
}

function confirmDone(){
  if(currentExercises.some(ex=>ex.sets.some(s=>s.reps||s.weight))){if(confirm('Save this workout before leaving?')){saveWorkout();return;}}
  showScreen('home');
}

function saveWorkout(){
  const w={...currentWorkout,exercises:JSON.parse(JSON.stringify(currentExercises)),unit:state.unit};
  state.workouts.unshift(w);save();showScreen('home');
}

function viewWorkout(id){
  const w=state.workouts.find(x=>x.id===id);if(!w)return;
  viewingId=id;const u=w.unit||'kg';
  document.getElementById('view-title').textContent=w.name.split(' — ')[1]||w.name;
  document.getElementById('view-date').textContent=w.date;
  document.getElementById('view-content').innerHTML=w.exercises.map(ex=>{
    const logged=ex.sets.filter(s=>s.reps||s.weight);
    return `<div class="card">
      <div class="ex-name" style="margin-bottom:2px;">${ex.name}</div>
      ${ex.note?`<div class="ex-note" style="margin-bottom:8px;">${ex.note}</div>`:'<div style="height:8px;"></div>'}
      ${logged.length?logged.map((s,i)=>`
        <div class="view-set-row">
          <span class="set-label">Set ${i+1}</span>
          <span>${s.reps?s.reps+' reps':'—'}</span>
          <span style="font-weight:500;color:var(--accent);">${s.weight?s.weight+' '+u:'—'}</span>
        </div>`).join(''):'<div style="font-size:13px;color:var(--text3);padding-top:4px;">No sets logged</div>'}
    </div>`;
  }).join('');
  showScreen('view-workout');
}

function deleteWorkout(){if(!confirm('Delete this workout?'))return;state.workouts=state.workouts.filter(w=>w.id!==viewingId);save();showScreen('home');}

function renderHome(){
  const now=new Date();const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());
  document.getElementById('stat-total').textContent=state.workouts.length;
  document.getElementById('stat-week').textContent=state.workouts.filter(w=>new Date(w.id)>=weekStart).length;
  const el=document.getElementById('workout-list');
  if(!state.workouts.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🏋️</div>No sessions yet<br><span style="font-size:13px;color:var(--text3);">Tap + Start to log your first workout</span></div>`;return;}
  el.innerHTML=state.workouts.map(w=>`
    <div class="card" style="cursor:pointer;" onclick="viewWorkout(${w.id})">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-weight:600;font-size:15px;">${w.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">${w.date} · ${w.exercises.length} exercises</div></div>
        <span class="chevron">›</span>
      </div>
    </div>`).join('');
}

renderHome();
</script>
</body>
</html>
